# affects
# - win de-simple.klc, ru-phon.klc, xkb symbols de-simple ru-phonetic
# - jetbrains keymap zmk.xml -> keymap.csv for the key combiner
# - layout.ahk windows
morph:
  config:
    exact: true
    keep: "all"

# lang layout
  EN_SET: "LG(F10)"
  RU_SET: "LG(F11)"
  DE_SET: "LG(F12)"
  NO_SET: "LG(F13)"

# nav layer
  NAVK3: "&none"
  NAVK:  "PAGE_UP"
  NAVK5: "PAGE_DOWN"

  NAVG: "&none"
  NAVH: { default: "HOME", ctrl: "LC(HOME)"}
  NAVC: { default: "END", ctrl: "LC(END)"}

  NAVO: "LCTRL"
  NAVA: "&select_word_left"
  NAVI: { default: "LC(LEFT)" }
  NAVN: { default: "LC(RIGHT)" }
  NAVN6: "\t"

  NAVJ: "LSHIFT"
  NAVU: "UP"
  NAVP: "DOWN"


  NAVQ4: "LEFT"
  NAVQ5: "RIGHT"

### LEFT SIDE
  # UPPER LEFT
  F1: "F1"
  F2: "F2"
  F3: "F3"
  F4: "F4"
  F5: "F5"
  K1: "F11"
  K2: "F12"

  # LEFT APPENDIX
  G1: "$"
  G2: "#"
  O1: '"'
  J1: "'"

  # LEFT MAIN
  # up
  K:  {                             lshift: "LS(F1)", rshift: "RS(F1)"  }
  G:  {                             lshift: "LC(X)",  rshift: "RS(F2)"  }                                                  # CTRL+X
  H:  { hold: "&mo_ui LS(LA(LGUI))",lshift: "LS(F3)", rshift: "RS(F3)",                                   pos: "C G N"}    # UI
  C:  {                             lshift: "LC(C)",  rshift: "RS(F4)", lctrl: "LC(F4)", rctrl: "RC(F4)" }                 # CTRL+C / disabled ctrl+c

  # middle
  O:  {                             lshift: "LS(F6)", rshift: "RS(F6)"  }
  A:  { hold: "LALT",               lshift: "LC(Z)",  rshift: "RS(F7)", lctrl: "LC(F7)", rctrl: "RC(F7)",  pos: "right"}   # CTRL+Z / disabled ctrl+a
  I:  { hold: "LSHIFT",             lshift: "LS(F8)", rshift: "RS(F8)",                                    pos: "G C A N F P W right"  }
  N:  { hold: "LCTRL",              lshift: "LC(S)",  rshift: "RS(F9)"  }                                                  # CTRL+S

  # down
  J: {                              lshift: "LS(F10)",rshift: "RS(F10)" }
  F: { hold: "&mo @nav",            lshift: "LC(F)",  rshift: "RS(F11)",lctrl: "LC(F11)", rctrl: "RC(F11)", pos: "H C P N right" } # NAV / CTRL+F / disabled ctrl+f
  U: {                              lshift: "LS(F12)",rshift: "RS(F12)" }
  P: {                              lshift: "LC(V)",  rshift: "RS(F13)" }                                                # CTRL+V
  Q: {                              lshift: "LC(Y)",  rshift: "RS(INS)" }                                                # CTRL+Y

  # LEFT CENTER APPENDIX
  K3: '\'
  K5: '/'
  K6: "~"
  C6: { default: "ESCAPE",          lshift: "LC(A)" }                                                                    # CTRL+A
  N6: "\n"
  P6: "."

  # LEFT LOWER
  Q1: { tap: "`", hold: "```",     tapping-term-ms: 250, require-prior-idle-ms: 0}
  Q2: "&"
  Q4: { tap: "[", hold: "]",       tapping-term-ms: 250, require-prior-idle-ms: 0}
  Q5: { tap: "(", hold: ")",       lshift: "LC(KP_NUM)",  rshift: "RS(KP_NUM)", tapping-term-ms: 250, require-prior-idle-ms: 0}

#### right
  # UPPER RIGHT
  F6: "F6"
  F7: "F7"
  F8: "F8"
  F9: "F9"
  F0: "F10"
  W9: "F19"
  W0: "F20"

  # MAIN RIGHT
  # up
  W:  {                     lshift: "LS(F5)",  rshift: "RS(F5)"  }
  V:  {                     lshift: "LS(F14)", rshift: "RS(F14)",  lctrl: "LC(F14)", rctrl: "RC(F14)" } # disable ctr+v
  L:  {                     lshift: "LS(F15)", rshift: "RS(F15)" }
  B:  {                     lshift: "LS(F16)", rshift: "RS(F16)" }

  # middle
  T:  { hold: "RCTRL",      lshift: "LS(F17)", rshift: "RS(F17)" }
  R:  { hold: "RSHIFT",     lshift: "LS(F18)", rshift: "RS(F18)", pos: "left" }
  E:  { hold: "RALT",       lshift: "LS(F19)", rshift: "RS(F19)", pos: "left" }
  S:  {                     lshift: "LS(F20)", rshift: "RS(F20)", lctrl: "LC(F20)", rctrl: "RC(F20)" }  # disable ctrl+s

  # down
  M:  {                     lshift: "LS(F21)", rshift: "RS(F21)" }
  D:  {                     lshift: "LS(F22)", rshift: "RS(F22)" }
  Y:  {                     lshift: "LS(F23)", rshift: "RS(F23)", lctrl: "LC(F23)", rctrl: "RC(F23)" }  # disable ctrl+y
  X:  {                     lshift: "LS(F24)", rshift: "RS(F24)" }
  Z:  {                     lshift: "LS(PAUSE_BREAK)", rshift: "RS(PAUSE_BREAK)", lctrl: "LC(PAUSE_BREAK)", rctrl: "RC(PAUSE_BREAK)"}   # disable ctrl+z

  # RIGHT CENTER
  W5: "%"
  V5: { tap: "=", hold: "==", tapping-term-ms: 250, require-prior-idle-ms: 0}
  T5: "\t"
  M5: ","

  # RIGHT APPENDIX
  W6: { tap: "-", hold: "->", tapping-term-ms: 250, require-prior-idle-ms: 0}
  W8: "+"
  B9: "<"
  B0: ">"
  S0: "?"
  X0: "_"


  # RIGHT LOWER
  Z6: { tap: "{", hold: "}", lshift: "LC(SLCK)",  rshift: "RS(SLCK)", tapping-term-ms: 280, require-prior-idle-ms: 0}
  Z7: "!"
  Z9: "|"
  Z0: "@"

##### thumbs
  TL1: "SPACE"
  TL2: { default: "BACKSPACE", lalt: "DELETE", ralt: "DELETE" } # move delete to left side as well
  TL3: "LS(LA(LG(H)))"  # extra key for quick use by mo_ui layer
  TL4: "&sl @num"
  TL5: "LGUI"
  TL6: "&magic @magic 0"

  TR1: "&sl @upper"
  TR2: "DELETE"
  TR3: "&sl @num"
  TR4: "&none"
  TR5: "RGUI"
  TR6: "&magic @magic 0"

hold-tap:
  config:
    flavor: "balanced"
    hold-trigger-on-release: true
    tapping-term-ms: 280
    quick-tap-ms: 175
    require-prior-idle-ms: 200
    positions: "left right"

macro:
  config:
    wait-ms: 0
    tap-ms: 0
  reloadkeymap: "<&kp LA(K) &kp TAB &kp TAB &kp SPACE &kp SPACE>"
  cut_line: "<&select_line &kp K_CUT &kp DELETE>"
  move_down: "<&cut_line &kp DOWN &kp K_PASTE>"
  move_up: "<&cut_line &kp UP_ARROW &kp K_PASTE>"
  select_word: "<&select_word_right>, <&select_word_left>"
  select_line: "<&kp HOME &kp LS(END)>"
  delete_word: "<&select_word &kp BACKSPACE>"
  delete_line: "<&select_line &kp BACKSPACE &kp BACKSPACE>"
  copy_line: "<&kp HOME &kp LS(END) &kp LC(C) &kp LC(RIGHT)>"
  select_word_right: "<&kp LC(RIGHT) &kp LC(LEFT) &kp LC(LS(RIGHT))>"
  select_word_left: "<&kp LC(LEFT) &kp LC(RIGHT) &kp LC(LS(LEFT))>"
  duplicate_line: "<&kp HOME &kp LS(END) &kp LC(C) &kp RIGHT &kp ENTER &kp LC(V)>"
  mo_ui: "<&macro_press>,<&mo @ui &macro_param_1to1>,<&macro_press>,<&kp MACRO_PLACEHOLDER>,<&macro_pause_for_release>,<&macro_param_1to1>,<&macro_release>,<&kp MACRO_PLACEHOLDER>,<&macro_release>,<&mo @ui>,<&macro_press>"
  exc_equal: "!="

combo:
  config:
    timeout-ms: 30
    layers: [0, 2]
  # left
  #GH: "+"
  #HC: "-"
  #GC: "*"

#  GI: ""
#  HA: ""
#  HN: ""
#  CI: ""

  #AI: "@"
#  IN: { tap: "`", hold: "```", tapping-term-ms: 250, require-prior-idle-ms: 0}
  #AN: "!"

#  AU: ""
#  IF: ""
#  IP: ""
#  NU: ""

#  FU:
#  PU: "./"
#  FP: ""


  # right
  #VL: "|"
  #LB: "&"
  # VB: {combo: "==", timeout-ms: 100 }

#  VR: ""
#  TL: "
#  LE: ""
#  BR: ""


#  TR: "^"
  #RE: "$"
  #TE: "|"

#  TD: ""
#  RM: ""
#  RY: ""
#  ED: ""

#  MD: "->"
#  DY:
#  MY: ""

layers:
  - main
  - typing
  - upper
  - nav
  - num
  - ui
  - gaming
  - magic

