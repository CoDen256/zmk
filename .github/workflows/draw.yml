name: Draw Keymap

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
  workflow_dispatch:

jobs:
  draw:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer==0.20.0

      - name: Parse keymap
        run: |
          keymap -c config/draw.yaml parse \
            -z config/glove80.keymap \
            -o config/parsed.yml

      - name: Draw SVG
        run: |
          keymap -c config/draw.yaml draw \
            config/parsed.yml \
            -o config/keymap.svg

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/keymap.svg
          git diff --cached --quiet || git commit -m "ZMK Build: update keymap SVG and firmware"
          git push